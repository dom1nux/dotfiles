$schema: https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
console_title_template: "{{.Folder}}{{if .Root}} as root{{end}} in {{.Shell}}"

blocks:
  - type: rprompt
    overflow: hidden
    segments:
      - type: git
        style: plain
        foreground: yellow
        template: "{{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}{{ if gt .Behind 0 }}▼{{ end }}{{ if gt .Ahead 0 }}▲{{ end }}"
        properties:
          branch_icon: ""
          fetch_status: true
          disable_with_jj: true
      - type: time
        style: plain
        foreground: magenta
        template: " {{ .CurrentDate | date .Format }}"
        properties:
          time_format: "15:04"
  - alignment: left
    type: prompt
    segments:
      - type: session
        style: plain
        foreground_templates:
          - "{{ if gt .Code 0 }}red{{ end }}"
          - "{{ if eq .Code 0 }}cyan{{ end }}"
        template: "@{{ .HostName }}{{ if .Env.WSL_DISTRO_NAME }}(wsl){{ end }} "
      - type: path
        style: plain
        foreground_templates:
          - "{{ if gt .Code 0 }}red{{ end }}"
          - "{{ if eq .Code 0 }}cyan{{ end }}"
        template: "{{ .Path }} "
        properties:
          folder_separator_icon: "/"
          style: unique
      - type: text
        style: plain
        foreground_templates:
          - "{{ if gt .Code 0 }}red{{ end }}"
          - "{{ if eq .Code 0 }}green{{ end }}"
        template: "▶ "
